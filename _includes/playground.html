{%- comment -%}
  Runnable JS playground. Usage inside a post:

    {% capture demo %}
    const sum = (a, b) => a + b;
    console.log(sum(2, 3));
    {% endcapture %}
    {% include playground.html title="Add two numbers" code=demo %}
{%- endcomment -%}
<div class="playground" data-playground>
  <div class="playground__bar">
    <span class="playground__title"><strong>JS</strong>&nbsp; {{ include.title | default: "Live playground" }}</span>
    <button class="playground__run" type="button" data-run aria-label="Run code">
      {% include icon.html name="play" %} Run
    </button>
  </div>
  <div class="playground__editor-container" style="display: grid; position: relative; width: 100%;">
    <textarea class="playground__editor" spellcheck="false" data-editor style="grid-area: 1/1; margin: 0; padding: 1.25rem 1.5rem; background: transparent; color: transparent; caret-color: var(--text); border: 0; resize: vertical; min-height: 140px; font-family: var(--font-mono); font-size: 0.86rem; line-height: 1.7; tab-size: 2; z-index: 2; width: 100%;" onfocus="this.style.outline='none'">{{ include.code }}</textarea>
    <pre class="playground__highlight" data-highlight style="grid-area: 1/1; margin: 0; padding: 1.25rem 1.5rem; pointer-events: none; z-index: 1; background: transparent; font-family: var(--font-mono); font-size: 0.86rem; line-height: 1.7; tab-size: 2; white-space: pre-wrap; word-wrap: break-word; color: var(--text-soft); overflow: hidden; width: 100%;"><code style="font-family: inherit; font-size: inherit; line-height: inherit; color: inherit;"></code></pre>
  </div>
  <div class="playground__console" data-console></div>
</div>
