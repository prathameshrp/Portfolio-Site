<div class="search-overlay" data-search-overlay hidden>
  <div class="search-overlay__backdrop" data-search-close></div>
  <div class="search-overlay__panel" role="dialog" aria-modal="true" aria-label="Search">
    <div class="search-overlay__field">
      {% include icon.html name="search" %}
      <input type="text" class="search-overlay__input" data-search-input placeholder="Search posts, tags, ideas..." autocomplete="off">
      <kbd class="search-overlay__kbd">esc</kbd>
    </div>
    <ul class="search-overlay__results" data-search-results></ul>
    <p class="search-overlay__empty" data-search-empty hidden>No results. Try another keyword.</p>
  </div>
</div>

<script id="search-index" type="application/json">
[
  {%- for post in site.posts -%}
  {
    "title": {{ post.title | jsonify }},
    "url": {{ post.url | relative_url | jsonify }},
    "date": {{ post.date | date: "%b %-d, %Y" | jsonify }},
    "tags": {{ post.tags | jsonify }},
    "excerpt": {{ post.excerpt | strip_html | strip_newlines | truncate: 160 | jsonify }}
  }{%- unless forloop.last -%},{%- endunless -%}
  {%- endfor -%}
]
</script>
