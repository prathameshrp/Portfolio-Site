<section style="position: relative; padding: 4rem 0;">
  <div class="container">
    <figure style="position: relative; border-left: 2px solid var(--jinx); padding-left: 1.5rem; margin: 0;">
      <span style="position: absolute; -left: 12px; -top: 12px; left: -10px; top: -10px; color: var(--jinx); background: var(--bg); display: inline-flex; align-items: center; justify-content: center;">
        {% include icon.html name="sparkles" %}
      </span>
      <blockquote style="font-size: clamp(1.25rem, 2.5vw, 2.1rem); line-height: 1.45; color: var(--text); font-family: var(--font-display); margin: 0 0 1rem; font-weight: 500;">
        <span style="color: var(--teal);">"</span>Programs must be written for people to read, and only incidentally for machines to execute.<span style="color: var(--teal);">"</span>
      </blockquote>
      <figcaption style="font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.05em;">
        &mdash; Harold Abelson & Gerald Jay Sussman, <span style="color: var(--powder);">SICP</span>
      </figcaption>
    </figure>
  </div>
</section>
