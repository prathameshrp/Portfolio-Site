# ─────────────────────────────────────────────────────────────
# Site identity
# ─────────────────────────────────────────────────────────────
title: "B-logs by Prathamesh"
brand_short: "B-logs"
tagline: "Building things, writing about them."
description: >-
  A developer blog about software engineering, systems, and the craft of
  building for the web — with interactive, runnable code.
author:
  name: "Prathamesh"
  email: "prathameshind305@gmail.com"

# ─────────────────────────────────────────────────────────────
# URL  (project page: https://prathameshrp.github.io/developer-site/)
# ─────────────────────────────────────────────────────────────
url: "https://0xprathamesh.is-a.dev"
baseurl: ""

# ─────────────────────────────────────────────────────────────
# Social / handles (used in footer + SEO)
# ─────────────────────────────────────────────────────────────
github_username: prathameshrp
twitter_username: ""
linkedin_username: ""

# ─────────────────────────────────────────────────────────────
# Build settings
# ─────────────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
permalink: /posts/:title/
sass:
  style: compressed
  sass_dir: assets/css

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# ─────────────────────────────────────────────────────────────
# Collections
# ─────────────────────────────────────────────────────────────
collections:
  projects:
    output: true
    permalink: /projects/:name/

# ─────────────────────────────────────────────────────────────
# Front-matter defaults
# ─────────────────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
    values:
      layout: default

# ─────────────────────────────────────────────────────────────
# Exclude
# ─────────────────────────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
  - .github
  - .sass-cache
