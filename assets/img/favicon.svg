<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Neon Pink Glow -->
    <filter id="pink-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Neon Cyan Glow -->
    <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Metallic gradient for the oxidized rim -->
    <linearGradient id="rim-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f4c3a" /> <!-- oxidized brass green-teal -->
      <stop offset="50%" stop-color="#2d6a4f" />
      <stop offset="100%" stop-color="#0f261d" />
    </linearGradient>
  </defs>

  <!-- Pitch black base -->
  <rect width="100%" height="100%" rx="18" fill="#07070c"/>

  <!-- OUTER RIVETED DIAL RIM (inspired by the Starry Eyed hatch) -->
  <circle cx="50" cy="50" r="43" fill="url(#rim-grad)" stroke="#11271e" stroke-width="2.5" />
  
  <!-- Rivets around the rim -->
  <circle cx="93" cy="50" r="2.2" fill="#4d8c6d" stroke="#0c1d16" stroke-width="0.8" />
  <circle cx="80.4" cy="80.4" r="2.2" fill="#4d8c6d" stroke="#0c1d16" stroke-width="0.8" />
  <circle cx="50" cy="93" r="2.2" fill="#4d8c6d" stroke="#0c1d16" stroke-width="0.8" />
  <circle cx="19.6" cy="80.4" r="2.2" fill="#4d8c6d" stroke="#0c1d16" stroke-width="0.8" />
  <circle cx="7" cy="50" r="2.2" fill="#4d8c6d" stroke="#0c1d16" stroke-width="0.8" />
  <circle cx="19.6" cy="19.6" r="2.2" fill="#4d8c6d" stroke="#0c1d16" stroke-width="0.8" />
  <circle cx="50" cy="7" r="2.2" fill="#4d8c6d" stroke="#0c1d16" stroke-width="0.8" />
  <circle cx="80.4" cy="19.6" r="2.2" fill="#4d8c6d" stroke="#0c1d16" stroke-width="0.8" />

  <!-- INNER DIAL FACE -->
  <circle cx="50" cy="50" r="35" fill="#0c101d" stroke="#070a14" stroke-width="2" />

  <!-- Vertical Divider Line -->
  <line x1="50" y1="16" x2="50" y2="84" stroke="#162035" stroke-width="1.5" stroke-dasharray="3 3" />

  <!-- Center Bolt -->
  <circle cx="50" cy="50" r="5" fill="#325a47" stroke="#10231b" stroke-width="1" />
  <line x1="47.5" y1="47.5" x2="52.5" y2="52.5" stroke="#10231b" stroke-width="1" /> <!-- screw slot -->

  <!-- LEFT: Jinx Cloud Swirl (Neon Pink) -->
  <path d="M 24 53
           C 20 49, 19 41, 24 36
           C 29 31, 38 33, 40 40
           C 40 45, 34 47, 32 42"
        fill="none" stroke="#ff007f" stroke-width="3" stroke-linecap="round" filter="url(#pink-glow)"/>

  <!-- RIGHT: Programming Terminal Prompt (Neon Cyan) -->
  <g filter="url(#cyan-glow)">
    <path d="M 63 42 L 71 50 L 63 58" fill="none" stroke="#00f0ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="73" y1="58" x2="81" y2="58" stroke="#00f0ff" stroke-width="3" stroke-linecap="round" />
  </g>

</svg>
