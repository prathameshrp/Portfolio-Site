name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      - name: Check HTML & links (internal)
        run: |
          gem install html-proofer --no-document
          htmlproofer ./_site \
            --disable-external \
            --ignore-empty-alt \
            --allow-missing-href \
            --no-enforce-https \
            --swap-urls "^/developer-site:"
