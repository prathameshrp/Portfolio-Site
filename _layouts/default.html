<!DOCTYPE html>
<html lang="en" data-theme="dark">
{% include head.html %}
<body class="layout-{{ page.layout | default: 'default' }}">
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="animus-scanlines" aria-hidden="true"></div>
  <div class="animus-vignette" aria-hidden="true"></div>

  <div class="aurora" aria-hidden="true">
    <span class="aurora__blob aurora__blob--1"></span>
    <span class="aurora__blob aurora__blob--2"></span>
    <span class="aurora__blob aurora__blob--3"></span>
    <span class="aurora__grid"></span>
  </div>

  {% include navbar.html %}

  <main id="main" class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}
  {% include search.html %}
  {% include scripts.html %}
</body>
</html>
