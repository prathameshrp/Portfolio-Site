<!DOCTYPE html>
<html lang="en" data-theme="dark">
{% include head.html %}

<body class="layout-{{ page.layout | default: 'default' }}" style="position: relative; min-height: 100vh;">
  <!-- Lovable overlays -->
  <div aria-hidden="true" class="bg-blueprint" style="position: fixed; inset: 0; pointer-events: none; opacity: 0.4; z-index: 0;"></div>
  <div aria-hidden="true" class="scanlines" style="position: fixed; inset: 0; pointer-events: none; opacity: 0.12; z-index: 0;"></div>

  <!-- Jinx/Arcane Parallax Margin Graffiti -->
  <svg class="jinx-graffiti jinx-graffiti--left" data-scroll-parallax="0.15" width="180" height="240" viewBox="0 0 100 130" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; pointer-events: none; z-index: 0; opacity: 0.12; color: var(--jinx); left: 3%; top: 350px;">
    <!-- Floppy ears -->
    <path d="M25,50 Q10,10 30,5 Q40,15 35,50" />
    <path d="M75,50 Q90,10 70,5 Q60,15 65,50" />
    <!-- Skull head -->
    <path d="M30,50 C20,50 20,80 30,85 L35,95 L65,95 L70,85 C80,80 80,50 70,50 Z" />
    <!-- Eyes - crosses -->
    <path d="M38,62 L48,72 M48,62 L38,72" />
    <path d="M52,62 L62,72 M62,62 L52,72" />
    <!-- Nose triangle -->
    <polygon points="50,78 47,82 53,82" fill="currentColor" />
    <!-- Teeth scribbles -->
    <path d="M38,90 L38,95 M44,90 L44,95 M50,90 L50,95 M56,90 L56,95 M62,90 L62,95" />
    <path d="M35,90 L65,90" />
    <!-- Splatters -->
    <circle cx="50" cy="50" r="42" stroke-dasharray="4 8" opacity="0.4" />
    <circle cx="20" cy="95" r="1.5" fill="currentColor" />
    <circle cx="82" cy="70" r="1.2" fill="currentColor" />
    <path d="M15,40 L10,35" />
  </svg>

  <svg class="jinx-graffiti jinx-graffiti--right" data-scroll-parallax="0.25" width="160" height="200" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; pointer-events: none; z-index: 0; opacity: 0.12; color: var(--teal); right: 3%; top: 850px;">
    <!-- Cloud shape -->
    <path d="M30,55 C15,55 15,35 30,35 C25,20 45,15 50,30 C60,15 80,20 75,35 C85,35 85,55 70,55 Z" />
    <!-- Swirl loops -->
    <path d="M40,45 Q50,35 60,45 T50,55" />
    <!-- Star icon -->
    <polygon points="50,15 53,25 63,25 55,31 58,40 50,34 42,40 45,31 37,25 47,25" fill="none" />
    <!-- Arrow bolts -->
    <path d="M20,65 L10,75 M10,75 H16 M10,75 V69" />
    <path d="M80,65 L90,75 M90,75 H84 M90,75 V69" />
  </svg>

  <a class="skip-link" href="#main">Skip to content</a>

  {% include navbar.html %}

  <main id="main" class="site-main" style="position: relative; z-index: 1;">
    {{ content }}
  </main>

  {%- if page.layout != "home" -%}
  {% include footer.html %}
  {%- endif -%}
  {% include search.html %}
  {% include scripts.html %}
</body>

</html>
